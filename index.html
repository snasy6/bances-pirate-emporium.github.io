<!DOCTYPE html>
<html>
<head>
    <title>Bances Pirate Emporium - Message Board</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="board">

    <h1>🏴‍☠️ Bances Pirate Emporium 🏴‍☠️</h1>
    <h2>Public Message Board</h2>

    <input id="name" type="text" placeholder="Pirate Name">

    <textarea id="message" placeholder="Write your message..."></textarea>

    <button id="postButton">
        Post Message
    </button>

    <hr>

    <h2>Messages</h2>

    <div id="messages">
        Loading messages...
    </div>

</div>


<script type="module" src="script.js"></script>

</body>
</html>
